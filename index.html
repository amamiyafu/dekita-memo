<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#8b8f77">
  <meta name="description" content="今日できたことを、ひとつだけでも記録できるメモアプリです。">
  <link rel="manifest" href="./manifest.json">
  <title>できたメモ</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body,
    #app {
      width: 100%;
      min-width: 0;
      min-height: 100%;
      overflow-x: hidden;
    }

    html {
      min-height: 100%;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      background: #f4f0e8;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      color: #2f302b;
      background: #f4f0e8;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      line-height: 1.7;
    }

    button,
    input,
    textarea {
      max-width: 100%;
      font: inherit;
      font-size: 16px;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    #app {
      display: flex;
      justify-content: center;
      padding: calc(20px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) calc(28px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));
    }

    .shell {
      width: 100%;
      max-width: 460px;
    }

    .app-header {
      padding: 10px 4px 18px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 28px;
      line-height: 1.25;
      font-weight: 700;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 6px;
      color: #68695d;
      font-size: 15px;
    }

    .card {
      width: 100%;
      margin-top: 14px;
      padding: 18px;
      border: 1px solid #ebe5d9;
      border-radius: 16px;
      background: #fffdf8;
      box-shadow: 0 8px 22px rgba(71, 63, 50, 0.06);
    }

    .backup-card {
      padding: 14px;
      border-color: #eee8dc;
      box-shadow: 0 5px 14px rgba(71, 63, 50, 0.04);
    }

    .description {
      color: #4d4e45;
      font-size: 15px;
      white-space: pre-line;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #3c3d35;
      font-size: 15px;
      font-weight: 700;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .input-wrap {
      width: 100%;
      min-width: 0;
      margin-bottom: 12px;
    }

    input[type="date"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
      display: block;
      font-size: 16px;
      min-height: 46px;
      padding: 11px 14px;
      border-radius: 14px;
      color: #303128;
      border: 1px solid #ded7c9;
      background: #fffaf1;
      outline: none;
    }

    input[type="date"]:focus {
      border-color: #9b9f83;
      box-shadow: 0 0 0 3px rgba(139, 143, 119, 0.18);
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 132px;
      padding: 14px 15px;
      resize: vertical;
      color: #303128;
      border: 1px solid #ded7c9;
      border-radius: 14px;
      background: #fffaf1;
      line-height: 1.65;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }

    textarea::placeholder {
      color: #989386;
    }

    textarea:focus {
      border-color: #9b9f83;
      box-shadow: 0 0 0 3px rgba(139, 143, 119, 0.18);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .save-button,
    .backup-button,
    .backup-toggle {
      min-height: 46px;
      padding: 11px 20px;
      border-radius: 999px;
      font-weight: 700;
    }

    .save-button {
      color: #ffffff;
      background: #6f755d;
    }

    .backup-button {
      width: 100%;
      color: #4f5145;
      border: 1px solid #d8d1c3;
      background: #faf6ed;
    }

    .backup-toggle {
      min-height: 38px;
      padding: 7px 16px;
      color: #4f5145;
      border: 1px solid #d8d1c3;
      background: #faf6ed;
      font-size: 14px;
    }

    .save-button:active,
    .backup-button:active,
    .backup-toggle:active {
      transform: translateY(1px);
    }

    .status,
    .backup-status {
      min-height: 24px;
      color: #696a5d;
      font-size: 14px;
    }

    .backup-text {
      margin-bottom: 10px;
      color: #4d4e45;
      font-size: 15px;
    }

    .backup-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .backup-head .section-title {
      margin-bottom: 0;
    }

    .backup-actions {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .section-title {
      margin-bottom: 12px;
      font-size: 18px;
      line-height: 1.4;
      font-weight: 700;
    }

    .empty {
      color: #77776c;
      font-size: 14px;
    }

    .record-list,
    .day-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .record-list {
      display: grid;
      gap: 10px;
    }

    .record-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
      padding: 10px 0;
      border-top: 1px solid #eee8dc;
    }

    .record-item:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .record-dot {
      flex: 0 0 auto;
      width: 6px;
      height: 6px;
      margin-top: 12px;
      border-radius: 50%;
      background: #a6a98d;
    }

    .record-text {
      flex: 1 1 auto;
      min-width: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .delete-button {
      flex: 0 0 auto;
      min-height: 32px;
      padding: 5px 10px;
      border: 1px solid #ded7c9;
      border-radius: 999px;
      color: #67675c;
      background: #faf6ed;
      font-size: 13px;
    }

    .day-list {
      display: grid;
      gap: 12px;
    }

    .day-card {
      padding: 14px;
      border: 1px solid #eee8dc;
      border-radius: 14px;
      background: #fffaf1;
    }

    .day-date {
      margin-bottom: 10px;
      color: #55564b;
      font-size: 14px;
      font-weight: 700;
    }

    @media (min-width: 720px) {
      #app {
        padding-top: calc(34px + env(safe-area-inset-top));
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="shell" aria-label="できたメモ">
      <header class="app-header">
        <h1>できたメモ</h1>
        <p class="subtitle">書けることだけ、そっと残すメモ。</p>
      </header>

      <section class="card" aria-label="説明">
        <p class="description">小さなことでも、書けることだけで大丈夫です。
何も思いつかない日は、空欄のまま保存してください。</p>
      </section>

      <section class="card backup-card" aria-labelledby="backupTitle">
        <div class="backup-head">
          <h2 class="section-title" id="backupTitle">バックアップ</h2>
          <button class="backup-toggle" type="button" id="backupToggle" aria-expanded="false" aria-controls="backupPanel">開く</button>
        </div>
        <p class="backup-text">大切な記録がなくならないように、定期的なバックアップをお願いします。</p>
        <div id="backupPanel" hidden>
          <div class="backup-actions">
            <button class="backup-button" type="button" id="exportButton">バックアップを書き出す</button>
            <button class="backup-button" type="button" id="importButton">バックアップを読み込む</button>
            <input class="visually-hidden" type="file" id="importFile" accept=".json,application/json">
          </div>
        </div>
        <p class="backup-status" id="backupStatus" aria-live="polite"></p>
      </section>

      <section class="card" aria-label="記録の入力">
        <div class="input-wrap">
          <label for="recordDate">日付</label>
          <input type="date" id="recordDate">
        </div>
        <label class="visually-hidden" for="memoText">今日のメモ</label>
        <textarea id="memoText" placeholder="今日は何ができましたか？" rows="4"></textarea>
        <div class="actions">
          <button class="save-button" type="button" id="saveButton">保存する</button>
          <p class="status" id="saveStatus" aria-live="polite"></p>
        </div>
      </section>

      <section class="card" aria-labelledby="todayTitle">
        <h2 class="section-title" id="todayTitle">今日の記録</h2>
        <div id="todayRecords"></div>
      </section>

      <section class="card" aria-labelledby="historyTitle">
        <h2 class="section-title" id="historyTitle">過去の記録</h2>
        <div id="historyRecords"></div>
      </section>


    </main>
  </div>

  <script>
    const STORAGE_KEY = "didMemoRecords";
    const DEFAULT_TEXT = "今日も生きた";

    const memoText = document.getElementById("memoText");
    const recordDate = document.getElementById("recordDate");
    const saveButton = document.getElementById("saveButton");
    const saveStatus = document.getElementById("saveStatus");
    const todayRecords = document.getElementById("todayRecords");
    const historyRecords = document.getElementById("historyRecords");
    const backupToggle = document.getElementById("backupToggle");
    const backupPanel = document.getElementById("backupPanel");
    const exportButton = document.getElementById("exportButton");
    const importButton = document.getElementById("importButton");
    const importFile = document.getElementById("importFile");
    const backupStatus = document.getElementById("backupStatus");

    let statusTimer = null;
    let backupStatusTimer = null;

    function getTodayKey() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function createId() {
      if (window.crypto && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return `${Date.now()}-${Math.random().toString(36).slice(2)}`;
    }

    function loadRecords() {
      try {
        const rawRecords = localStorage.getItem(STORAGE_KEY);
        const parsedRecords = rawRecords ? JSON.parse(rawRecords) : [];
        return Array.isArray(parsedRecords) ? parsedRecords : [];
      } catch (error) {
        return [];
      }
    }

    function saveRecords(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function sortNewestFirst(records) {
      return [...records].sort((a, b) => {
        const dateCompare = b.date.localeCompare(a.date);
        if (dateCompare !== 0) {
          return dateCompare;
        }
        return new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime();
      });
    }

    function groupByDate(records) {
      return sortNewestFirst(records).reduce((groups, record) => {
        if (!groups[record.date]) {
          groups[record.date] = [];
        }
        groups[record.date].push(record);
        return groups;
      }, {});
    }

    function createRecordItem(record) {
      const item = document.createElement("li");
      item.className = "record-item";

      const dot = document.createElement("span");
      dot.className = "record-dot";
      dot.setAttribute("aria-hidden", "true");

      const text = document.createElement("span");
      text.className = "record-text";
      text.textContent = record.text;

      const deleteButton = document.createElement("button");
      deleteButton.className = "delete-button";
      deleteButton.type = "button";
      deleteButton.textContent = "削除";
      deleteButton.addEventListener("click", () => deleteRecord(record.id));

      item.append(dot, text, deleteButton);
      return item;
    }

    function renderToday(records) {
      const today = getTodayKey();
      const todaysRecords = sortNewestFirst(records).filter((record) => record.date === today);

      todayRecords.replaceChildren();

      if (todaysRecords.length === 0) {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = "今日の記録はまだありません。";
        todayRecords.append(empty);
        return;
      }

      const list = document.createElement("ul");
      list.className = "record-list";
      todaysRecords.forEach((record) => list.append(createRecordItem(record)));
      todayRecords.append(list);
    }

    function renderHistory(records) {
      const today = getTodayKey();
      const pastRecords = records.filter((record) => record.date < today);
      const groupedRecords = groupByDate(pastRecords);
      const dates = Object.keys(groupedRecords).sort().reverse();

      historyRecords.replaceChildren();

      if (dates.length === 0) {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = "過去の記録はまだありません。";
        historyRecords.append(empty);
        return;
      }

      const dayList = document.createElement("ul");
      dayList.className = "day-list";

      dates.forEach((date) => {
        const dayItem = document.createElement("li");
        dayItem.className = "day-card";

        const dateLabel = document.createElement("p");
        dateLabel.className = "day-date";
        dateLabel.textContent = date;

        const recordList = document.createElement("ul");
        recordList.className = "record-list";
        groupedRecords[date].forEach((record) => recordList.append(createRecordItem(record)));

        dayItem.append(dateLabel, recordList);
        dayList.append(dayItem);
      });

      historyRecords.append(dayList);
    }

    function render() {
      const records = loadRecords();
      renderToday(records);
      renderHistory(records);
    }

    function showSavedStatus() {
      saveStatus.textContent = "保存しました";
      window.clearTimeout(statusTimer);
      statusTimer = window.setTimeout(() => {
        saveStatus.textContent = "";
      }, 1800);
    }

    function showBackupStatus(message) {
      backupStatus.textContent = message;
      window.clearTimeout(backupStatusTimer);
      backupStatusTimer = window.setTimeout(() => {
        backupStatus.textContent = "";
      }, 2600);
    }

    function addRecord() {
      const trimmedText = memoText.value.trim();
      const now = new Date();
      const selectedDate = isValidDateKey(recordDate.value) ? recordDate.value : getTodayKey();
      const records = loadRecords();
      const record = {
        id: createId(),
        date: selectedDate,
        text: trimmedText || DEFAULT_TEXT,
        createdAt: now.toISOString()
      };

      records.push(record);
      saveRecords(records);
      memoText.value = "";
      showSavedStatus();
      render();
    }

    function deleteRecord(id) {
      const records = loadRecords().filter((record) => record.id !== id);
      saveRecords(records);
      render();
    }

    function exportRecords() {
      const records = loadRecords();
      const json = JSON.stringify(records, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `dekita-memo-backup-${getTodayKey()}.json`;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function isValidDateKey(date) {
      return typeof date === "string" && /^\d{4}-\d{2}-\d{2}$/.test(date);
    }

    function isValidCreatedAt(createdAt) {
      return typeof createdAt === "string" && !Number.isNaN(Date.parse(createdAt));
    }

    function normalizeImportedRecord(record) {
      if (!record || typeof record !== "object" || Array.isArray(record)) {
        return null;
      }

      if (!isValidDateKey(record.date) || typeof record.text !== "string" || !isValidCreatedAt(record.createdAt)) {
        return null;
      }

      return {
        id: typeof record.id === "string" && record.id.trim() ? record.id : createId(),
        date: record.date,
        text: record.text,
        createdAt: record.createdAt
      };
    }

    function importRecordsFromJson(jsonText) {
      let importedRecords;

      try {
        importedRecords = JSON.parse(jsonText);
      } catch (error) {
        showBackupStatus("読み込めないファイルです");
        return;
      }

      if (!Array.isArray(importedRecords)) {
        showBackupStatus("読み込めないファイルです");
        return;
      }

      const currentRecords = loadRecords();
      const existingIds = new Set(currentRecords.map((record) => record.id));
      const recordsToAdd = [];
      let validRecordCount = 0;

      for (const importedRecord of importedRecords) {
        const normalizedRecord = normalizeImportedRecord(importedRecord);
        if (!normalizedRecord) {
          continue;
        }
        validRecordCount += 1;
        if (existingIds.has(normalizedRecord.id)) {
          continue;
        }
        existingIds.add(normalizedRecord.id);
        recordsToAdd.push(normalizedRecord);
      }

      if (importedRecords.length > 0 && validRecordCount === 0) {
        showBackupStatus("読み込めないファイルです");
        return;
      }

      saveRecords([...currentRecords, ...recordsToAdd]);
      render();
      showBackupStatus("バックアップを読み込みました");
    }

    function openImportFilePicker() {
      const confirmed = window.confirm("バックアップを読み込みます。現在の記録は残したまま追加します。");
      if (!confirmed) {
        return;
      }
      importFile.value = "";
      importFile.click();
    }

    function handleImportFileChange() {
      const file = importFile.files && importFile.files[0];
      if (!file) {
        return;
      }

      const reader = new FileReader();
      reader.addEventListener("load", () => {
        if (typeof reader.result !== "string") {
          showBackupStatus("読み込めないファイルです");
          return;
        }
        importRecordsFromJson(reader.result);
      });
      reader.addEventListener("error", () => {
        showBackupStatus("読み込めないファイルです");
      });
      reader.readAsText(file);
    }

    function toggleBackupPanel() {
      const shouldOpen = backupPanel.hidden;
      backupPanel.hidden = !shouldOpen;
      backupToggle.textContent = shouldOpen ? "閉じる" : "開く";
      backupToggle.setAttribute("aria-expanded", String(shouldOpen));
    }

    recordDate.value = getTodayKey();

    saveButton.addEventListener("click", addRecord);
    backupToggle.addEventListener("click", toggleBackupPanel);
    exportButton.addEventListener("click", exportRecords);
    importButton.addEventListener("click", openImportFilePicker);
    importFile.addEventListener("change", handleImportFileChange);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }

    render();
  </script>
</body>
</html>
